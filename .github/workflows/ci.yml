name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: learnika_local
          POSTGRES_PASSWORD: learnika_local_password
          POSTGRES_USER: learnika_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U learnika_local -d learnika_local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_ACCESS_TOKEN_TTL_SECONDS: "900"
      AUTH_REFRESH_TOKEN_TTL_SECONDS: "604800"
      AUTH_TOKEN_SECRET: learnika_ci_auth_token_secret_local_only_replace_before_shared_use
      DATABASE_URL: postgresql://learnika_local:learnika_local_password@127.0.0.1:5432/learnika_local
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Activate pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
          pnpm --version

      - name: Add pnpm.cmd compatibility shim
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/usr/bin/env sh\nexec pnpm "$@"\n' > "$HOME/.local/bin/pnpm.cmd"
          chmod +x "$HOME/.local/bin/pnpm.cmd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify pnpm.cmd shim
        run: pnpm.cmd --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm.cmd run db:generate

      - name: Validate local infrastructure config
        run: |
          pnpm.cmd run infra:config
          pnpm.cmd run infra:check:env

      - name: Validate Prisma schema
        run: pnpm.cmd run db:validate

      - name: Apply PostgreSQL migrations
        run: pnpm.cmd run db:migrate:deploy

      - name: Run project validation
        run: pnpm.cmd run validate
